<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}SecureShare{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f0f0f;
      --surface:  #1a1a1a;
      --border:   #2e2e2e;
      --muted:    #555;
      --text:     #e0e0e0;
      --text-dim: #888;
      --accent:   #d4d4d4;
      --danger:   #c0392b;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 15px;
      min-height: 100vh;
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ── Nav ── */
    nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .nav-brand {
      font-weight: 700;
      font-size: 1.1rem;
      letter-spacing: .03em;
      color: var(--text);
    }
    .nav-links { display: flex; gap: 1rem; align-items: center; }
    .nav-links a { color: var(--text-dim); font-size: .9rem; }
    .nav-links a:hover { color: var(--text); text-decoration: none; }

    /* ── Button ── */
    .btn {
      display: inline-block;
      padding: .45rem 1.1rem;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: .875rem;
      cursor: pointer;
      transition: background .15s, border-color .15s;
    }
    .btn:hover { background: var(--border); border-color: var(--muted); text-decoration: none; }
    .btn-primary {
      background: var(--text);
      color: var(--bg);
      border-color: var(--text);
    }
    .btn-primary:hover { background: var(--accent); border-color: var(--accent); }
    .btn-danger { border-color: var(--danger); color: var(--danger); }
    .btn-danger:hover { background: var(--danger); color: #fff; border-color: var(--danger); }

    /* ── Flash messages (fixed overlay, never affects layout) ── */
    .flashes {
      position: fixed;
      top: 1rem;
      left: 50%;
      transform: translateX(-50%);
      list-style: none;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: .5rem;
      pointer-events: none;
    }
    .flash {
      padding: .6rem 1.1rem;
      border-radius: 4px;
      font-size: .875rem;
      border: 1px solid var(--border);
      background: var(--surface);
      white-space: nowrap;
      pointer-events: auto;
    }
    .flash.error { border-color: var(--danger); color: #e57373; }

    /* ── Main container ── */
    .container {
      max-width: 680px;
      margin: 0 auto;
      padding: 2rem 1rem;
    }
  </style>
</head>
<body>

{% if session.user_id %}
<nav>
  <span class="nav-brand">SecureShare</span>
  <div class="nav-links">
    <a href="{{ url_for('views.wall') }}">Wall</a>
    <a href="{{ url_for('views.logout') }}" class="btn btn-danger" style="padding:.3rem .8rem;font-size:.8rem;">Log out</a>
  </div>
</nav>
{% endif %}

{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    <ul class="flashes">
      {% for category, message in messages %}
        <li class="flash {{ category }}">{{ message }}</li>
      {% endfor %}
    </ul>
  {% endif %}
{% endwith %}

{% block content %}{% endblock %}

</body>
</html>
