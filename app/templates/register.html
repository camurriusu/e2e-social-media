{% extends "base.html" %}
{% block title %}Register — SecureShare{% endblock %}

{% block content %}
<style>
  .auth-wrap {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }
  .auth-card {
    width: 100%;
    max-width: 380px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 2rem;
  }
  .auth-card h1 { font-size: 1.3rem; font-weight: 700; margin-bottom: .25rem; }
  .auth-card .subtitle { color: var(--text-dim); font-size: .875rem; margin-bottom: 1.75rem; }
  .field { margin-bottom: 1.1rem; }
  .field label {
    display: block;
    font-size: .8rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: .06em;
    margin-bottom: .4rem;
  }
  .field input {
    width: 100%;
    padding: .55rem .75rem;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-size: .95rem;
    outline: none;
    transition: border-color .15s;
  }
  .field input:focus { border-color: var(--muted); }
  .auth-card .btn-primary { width: 100%; padding: .65rem; margin-top: .5rem; font-size: .95rem; }
  .auth-footer { text-align: center; margin-top: 1.25rem; font-size: .85rem; color: var(--text-dim); }
</style>

<div class="auth-wrap">
  <div class="auth-card">
    <h1>Create account</h1>
    <p class="subtitle">Join a secure group on SecureShare</p>

    <form method="POST" action="{{ url_for('views.register') }}">
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" autocomplete="username" autofocus required>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="new-password" required>
      </div>
      <div class="field">
        <label for="confirm">Confirm password</label>
        <input type="password" id="confirm" name="confirm" autocomplete="new-password" required>
      </div>
      <button type="submit" class="btn btn-primary">Create account</button>
    </form>

    <p class="auth-footer">
      Already have an account? <a href="{{ url_for('views.login') }}">Sign in</a>
    </p>
  </div>
</div>
{% endblock %}
