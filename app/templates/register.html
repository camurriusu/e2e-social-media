{% extends "base.html" %}
{% block title %}Register — SecureShare{% endblock %}

{% block styles %}
  <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
{% endblock %}

{% block content %}

<div class="auth-wrap">
  <div class="auth-card">
    <h1>Create account</h1>
    <p class="subtitle">Join a secure group on SecureShare</p>

    <form method="POST" action="{{ url_for('views.register') }}">
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" autocomplete="username" autofocus required>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="new-password" required>
      </div>
      <div class="field">
        <label for="confirm">Confirm password</label>
        <input type="password" id="confirm" name="confirm" autocomplete="new-password" required>
      </div>
      <button type="submit" class="btn btn-primary">Create account</button>
    </form>

    <p class="auth-footer">
      Already have an account? <a href="{{ url_for('views.login') }}">Sign in</a>
    </p>
  </div>
</div>
{% endblock %}
